spring.application.name=RoutingSystem

# Datasource config
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/routingSystemDB}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA implementation config
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#debug=true
#logging.level.org.springframework.web=DEBUG
#logging.level.root=DEBUG

# Max pages to extract from the PDF
app.text.extract.max-pages=2

# Allow extracting text from encrypted PDFs
app.text.extract.allow-encrypted=false




