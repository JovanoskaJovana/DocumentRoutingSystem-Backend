app:
  routing:
    # when no rules match use the admin departmentId
    admin-dept-id: 1

    # map: departmentId -> list of keywords
    # case-sensitive, word-matched
    keyword-rules:
      "103": ["invoice", "payment", "finance", "receipt"]
      "104": ["contract", "agreement", "legal"]
      "105": ["employee", "vacation", "leave", "hr"]
      "52": ["incident", "bug", "system", "ticket", "it"]


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_TIME_MS}