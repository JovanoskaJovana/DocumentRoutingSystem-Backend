app:
  routing:
    # when no rules match use the admin departmentId
    admin-dept-id: 1

    # map: departmentId -> list of keywords
    # case-sensitive, word-matched
    keyword-rules:
      "2": ["invoice", "payment", "finance", "receipt"]
      "3": ["contract", "agreement", "legal"]
      "4": ["employee", "vacation", "leave"]
      "5": ["incident", "bug", "system", "ticket"]
