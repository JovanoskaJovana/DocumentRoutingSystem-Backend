app:
  routing:
    tenants:
      PTR:
        admin-dept-key: ADMIN
        departments:
          FN:
            strong: [ "invoice number", "expense report", "purchase order",
                      "bank transfer", "vat", "balance sheet", "statement of account" ]

            weak: [ "finance", "invoice", "payment", "receipt", "billing", "cash flow",
                    "income", "expense", "refund", "budget", "revenue", "audit",
                    "liability", "advance", "loss", "profit", "accounting" ]

